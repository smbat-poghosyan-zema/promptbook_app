  # ─────────────────────────────────────────────────────────────────
  - id: "fix-resume-in-place"
    title: "Fix resume bug: continue existing run in-place (no new Runs entry)"
    prompt: |
      ## Problem
      When a run fails and the user clicks Resume, the current code calls
      `start_run_background_from` which calls `prepare_run` → creates a NEW run
      record in the DB → appears as a NEW entry in the Runs list. The original
      run stays as "failure" forever. This is wrong.

      ## Goal
      Resume should continue the EXISTING run:
      - The original run's status changes from "failure" → "running" → "success"/"failure".
      - The original run_id is reused for all events.
      - No new entry appears in the Runs list.
      - Steps that already succeeded are skipped.
      - The first non-success step is re-executed.

      ## Implementation

      ### 1. New `resume_run_in_place` function in run_manager.rs

      Add this public function:

      ```rust
      pub fn resume_run_in_place(
          run_id: i64,
          app_data_dir: &Path,
          event_callback: Option<RunEventCallback>,
      ) -> RunManagerResult<()> {
          // 1. Load the existing run from DB
          let repo = StorageRepository::open_in_app_data_dir(app_data_dir)?;
          let detail = repo
              .get_run_detail(run_id)?
              .ok_or_else(|| RunManagerError::PromptbookParse(
                  format!("run {run_id} not found")
              ))?;

          // 2. Parse metadata to get promptbook_path, workspace_dir, agent, model, effort
          let metadata = parse_run_metadata_json(detail.run.metadata_json.as_deref());
          let promptbook_path = metadata.promptbook_path
              .ok_or_else(|| RunManagerError::PromptbookParse(
                  "run has no promptbook_path in metadata".to_string()
              ))?;
          let workspace_dir = metadata.workspace_dir
              .unwrap_or_else(|| ".".to_string());
          let agent = detail.run.agent_default.clone();
          let model = metadata.model.clone();
          let effort_level = metadata.effort_level.clone();

          // 3. Load promptbook
          let promptbook = load_promptbook(Path::new(&promptbook_path))?;

          // 4. Find the first non-success step (the resume point)
          let succeeded_ids: std::collections::HashSet<String> = detail
              .steps
              .iter()
              .filter(|s| s.status == "success")
              .map(|s| s.step_id.clone())
              .collect();

          let from_step_id = promptbook
              .steps
              .iter()
              .find(|s| !succeeded_ids.contains(&s.id))
              .map(|s| s.id.clone());

          // 5. Update run status to "running" in DB
          let repo2 = StorageRepository::open_in_app_data_dir(app_data_dir)?;
          repo2.update_run_status(run_id, "running", None)?;

          // 6. Reset non-success steps to "pending" so they show correctly
          for step in &promptbook.steps {
              if !succeeded_ids.contains(&step.id) {
                  // Step record may exist (failed) or not (never reached)
                  // Upsert: update if exists, ignore if not present
                  let _ = repo2.update_step_status(run_id, &step.id, "pending", None);
              }
          }

          // 7. Register run handle with existing run_id
          register_run_handle(run_id)?;

          let app_data_dir_owned = app_data_dir.to_path_buf();
          let workspace_path = Path::new(&workspace_dir).to_path_buf();
          let from_step_id_clone = from_step_id.clone();
          let promptbook_clone = promptbook.clone();
          let model_clone = model.clone();
          let effort_clone = effort_level.clone();

          let join_handle = run_runtime().spawn_blocking(move || {
              let result = (|| -> RunManagerResult<()> {
                  let _slot = acquire_parallel_run_slot(DEFAULT_MAX_PARALLEL_RUNS)?;
                  let repo = StorageRepository::open_in_app_data_dir(&app_data_dir_owned)?;

                  let default_agent = agent
                      .as_deref()
                      .unwrap_or("codex")
                      .to_string();
                  let adapter_options = AdapterOptions {
                      model: model_clone,
                      effort_level: effort_clone,
                      ..AdapterOptions::default()
                  };

                  let run_status = execute_steps_from(
                      &repo,
                      run_id,
                      &promptbook_clone,
                      &default_agent,
                      &workspace_path,
                      &app_data_dir_owned,
                      from_step_id_clone.as_deref(),
                      adapter_options,
                      event_callback.as_ref(),
                  )?;

                  let finished_at = now_timestamp();
                  repo.update_run_status(run_id, &run_status, Some(&finished_at))?;
                  emit_run_event(
                      event_callback.as_ref(),
                      RunEvent::RunFinished { run_id, status: run_status, ts: finished_at },
                  );
                  unregister_run_handle(run_id)?;
                  Ok(())
              })();

              if let Err(_err) = result {
                  let _ = unregister_run_handle(run_id);
                  if let Ok(repo) = StorageRepository::open_in_app_data_dir(&app_data_dir_owned) {
                      let _ = repo.update_run_status(run_id, "failure", Some(&now_timestamp()));
                  }
              }
          });
          set_run_task(run_id, join_handle)?;
          Ok(())
      }
      ```

      Add a helper `parse_run_metadata_json` (equivalent to the `parse_run_metadata`
      in ipc.rs but in run_manager.rs, returning a simple struct):
      ```rust
      struct RunMetadataFields {
          promptbook_path: Option<String>,
          workspace_dir: Option<String>,
          model: Option<String>,
          effort_level: Option<String>,
      }

      fn parse_run_metadata_json(metadata: Option<&str>) -> RunMetadataFields {
          let Some(json) = metadata else {
              return RunMetadataFields { promptbook_path: None, workspace_dir: None,
                                         model: None, effort_level: None };
          };
          let Ok(value) = serde_json::from_str::<serde_json::Value>(json) else {
              return RunMetadataFields { promptbook_path: None, workspace_dir: None,
                                         model: None, effort_level: None };
          };
          RunMetadataFields {
              promptbook_path: value.get("promptbook_path")
                  .and_then(|v| v.as_str()).map(ToOwned::to_owned),
              workspace_dir: value.get("workspace_dir")
                  .and_then(|v| v.as_str()).map(ToOwned::to_owned),
              model: value.get("model")
                  .and_then(|v| v.as_str()).map(ToOwned::to_owned),
              effort_level: value.get("effort_level")
                  .and_then(|v| v.as_str()).map(ToOwned::to_owned),
          }
      }
      ```

      Also add `execute_steps_from` — essentially the current `execute_steps` but
      extracted to accept `from_step_id` as a regular parameter and `AdapterOptions`
      directly (instead of building it inside). This avoids code duplication.
      Refactor `execute_steps` to call `execute_steps_from` internally.

      ### 2. Update `resume_run` IPC command in ipc.rs

      Replace the existing `resume_run` command body:
      ```rust
      #[tauri::command]
      pub fn resume_run(
          state: tauri::State<'_, IpcState>,
          original_run_id: i64,
      ) -> IpcResult<i64> {
          let app_data_dir = state.resolve_app_data_dir();
          let emitter = Arc::clone(&state.event_emitter);
          let callback: RunEventCallback = Arc::new(move |event: RunEvent| {
              let _ = emitter.emit_run_event(map_run_event(event));
          });

          crate::run_manager::resume_run_in_place(
              original_run_id,
              &app_data_dir,
              Some(callback),
          )
          .map_err(|err| err.to_string())?;

          // Return the SAME run_id so the UI re-selects it
          Ok(original_run_id)
      }
      ```

      Note the return type is still `IpcResult<i64>` (returns the original run_id)
      so the frontend re-selects the same run — no need to change the frontend
      `handleResumeRun` beyond confirming it calls `setSelectedRunId(newRunId)` where
      `newRunId === original_run_id`.

      ### 3. Export `resume_run_in_place` from lib.rs

      Add to `pub use run_manager::{..., resume_run_in_place};` in lib.rs.

      ### 4. Tests

      #### Rust test: resume_run_in_place resumes correctly

      In run_manager.rs tests:
      ```rust
      #[test]
      fn resume_run_in_place_continues_from_failed_step_without_new_run() {
          let _guard = run_manager_test_lock();
          let workspace_dir = temp_workspace_dir("resume-in-place");
          let promptbook_path = write_two_step_fixture(&workspace_dir);
          let app_data_dir = workspace_dir.join(".promptbook_runs");

          // Start a run that will succeed both steps
          let run_id = run_promptbook(
              &promptbook_path.to_string_lossy(),
              Some("dry-run"),
              &workspace_dir.to_string_lossy(),
              None,
              None,
          ).expect("first run");

          // Manually set step-1 to failure to simulate a stopped run
          let repo = StorageRepository::open_in_app_data_dir(&app_data_dir).unwrap();
          repo.update_step_status(run_id, "step-1", "failure", None).unwrap();
          repo.update_run_status(run_id, "failure", None).unwrap();
          drop(repo);

          // Resume in place
          resume_run_in_place(run_id, &app_data_dir, None)
              .expect("resume in place");

          // Wait for completion
          wait_for_run_completion(&app_data_dir, run_id);

          let repo = StorageRepository::open_in_app_data_dir(&app_data_dir).unwrap();
          let runs = repo.list_runs().unwrap();
          // Should still be only ONE run (not two)
          assert_eq!(runs.iter().filter(|r| r.id == run_id).count(), 1,
              "resume should not create a new run");

          let detail = repo.get_run_detail(run_id).unwrap().unwrap();
          assert_eq!(detail.run.status, "success",
              "run should be success after resume");

          let _ = fs::remove_dir_all(workspace_dir);
      }
      ```

      Note: `run_promptbook` signature now takes `model` and `effort_level` params
      — pass `None, None`.

      #### Vitest test: handleResumeRun re-selects same run

      In App.test.ts, add a mock that returns the same run_id for `resume_run`
      and verify the component doesn't create a duplicate entry.

