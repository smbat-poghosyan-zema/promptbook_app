schema_version: "promptbook/v1"
name: "fix-and-enhance"
version: "1.0.0"
description: >
  Implements all UI fixes and feature enhancements for Promptbook Runner:
  native file picker, open-folder in file manager, dynamic model+effort selection,
  rich run-list items, per-step live progress / final output split, and stop/resume.

defaults:
  agent: "claude"
  workspace_dir: "."
  approval_mode: "auto"
  timeout_minutes: 60

global_rules:
  - "Work in the repo at the workspace_dir passed at runtime."
  - "Run 'pnpm test' and 'cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml' after each step to ensure green."
  - "Run 'pnpm lint' after each step to ensure zero lint errors."
  - "Commit after each step with message 'fix/<step-id>: <step-title>'."
  - "TDD: add or update tests before or alongside implementation."
  - "Do NOT break existing tests. If a test becomes stale, update it."
  - "Keep changes minimal and focused on the step goal."
  - "The app uses Tauri v2 + React + TypeScript (pnpm workspace)."
  - "Rust code lives in apps/desktop/src-tauri/src/. Frontend in apps/desktop/src/."
  - "Shared types live in packages/shared/src/."

steps:
  - id: "fix-file-picker"
    title: "Fix Browse button: native Tauri file dialog"
    prompt: |
      The "Browse" button in the Promptbook file picker currently does nothing useful —
      the Rust IPC command `open_file_picker_for_promptbook` in
      `apps/desktop/src-tauri/src/ipc.rs` only reads from a `PROMPTBOOK_PATH`
      environment variable and returns `None` when the env var is not set.

      ## Goal
      Replace that env-var hack with a real native file-open dialog using
      `tauri-plugin-dialog` (Tauri v2).

      ## Implementation steps

      ### 1. Add the Tauri dialog plugin

      In `apps/desktop/src-tauri/Cargo.toml`, add to `[dependencies]`:
      ```
      tauri-plugin-dialog = "2"
      ```

      ### 2. Register the plugin in lib.rs

      In `apps/desktop/src-tauri/src/lib.rs`, in the `run()` function,
      after `.setup(|app| { … })` and before `.invoke_handler(…)`, add:
      ```rust
      .plugin(tauri_plugin_dialog::init())
      ```

      Import at the top of lib.rs (or make sure it's in scope):
      ```rust
      // tauri_plugin_dialog is re-exported via the plugin; no explicit use needed
      // but ensure the crate is in scope for init()
      ```

      ### 3. Rewrite `open_file_picker_for_promptbook` in ipc.rs

      Make it `async` and use the dialog plugin:
      ```rust
      #[tauri::command]
      pub async fn open_file_picker_for_promptbook(
          app_handle: tauri::AppHandle,
      ) -> IpcResult<Option<String>> {
          use tauri_plugin_dialog::DialogExt;
          let path = app_handle
              .dialog()
              .file()
              .add_filter("Promptbook YAML", &["yaml", "yml"])
              .blocking_pick_file();
          Ok(path.map(|p| p.to_string()))
      }
      ```

      Note: `blocking_pick_file()` blocks the current thread until the user
      closes the dialog; this is fine for an async Tauri command running on
      a thread pool.  `FilePath::to_string()` gives the absolute path string.

      ### 4. Update the invoke_handler in lib.rs

      The `ipc::open_file_picker_for_promptbook` entry in `tauri::generate_handler![]`
      doesn't need to change — Tauri v2 handles async commands automatically.

      ### 5. Update existing IPC test

      The existing test `file_picker_uses_promptbook_path_env_var` in
      `apps/desktop/src-tauri/src/ipc.rs` relied on the env-var path.
      Replace it with a test that just verifies the function signature compiles
      (we can't open a real dialog in unit tests) — rename it to
      `file_picker_command_compiles` and assert `true` (compile-time proof).
      Keep `file_picker_returns_none_for_missing_or_unset_path` but mark it as
      a doc-comment that its behavior has changed.

      Actually: just delete the two old file-picker env-var tests since the
      implementation no longer uses env vars. Add a compile-time smoke comment.

      ## Verification
      - `cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml` — all pass
      - `pnpm test` — all pass
      - `pnpm lint` — zero errors
    verify:
      - "cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml"
      - "pnpm test"
      - "pnpm lint"

  - id: "fix-open-sample-folder"
    title: "Fix 'Open sample promptbooks folder' — actually open in file manager"
    prompt: |
      Currently the "Open sample promptbooks folder" button shows a toast with the
      folder path but doesn't open anything.  The Rust IPC command
      `open_sample_promptbooks_folder` in `apps/desktop/src-tauri/src/ipc.rs`
      just resolves and returns the path string.

      ## Goal
      Make the button actually open the folder in the system file manager AND
      remove the toast (the folder opening is feedback enough), OR keep a
      dismissible toast only as a fallback error message.

      ## Implementation steps

      ### 1. Add `tauri-plugin-shell` to Cargo.toml
      ```
      tauri-plugin-shell = "2"
      ```

      ### 2. Register the plugin in lib.rs
      In `run()`, chain:
      ```rust
      .plugin(tauri_plugin_shell::init())
      ```

      ### 3. Rewrite `open_sample_promptbooks_folder` in ipc.rs
      Make it `async` and open the folder using the shell plugin:
      ```rust
      #[tauri::command]
      pub async fn open_sample_promptbooks_folder(
          app_handle: tauri::AppHandle,
      ) -> IpcResult<String> {
          use tauri_plugin_shell::ShellExt;
          let sample_dir = resolve_sample_promptbooks_dir()?;
          let path_str = sample_dir.to_string_lossy().to_string();
          // Open in system file manager (xdg-open on Linux)
          app_handle
              .shell()
              .command("xdg-open")
              .args([&path_str])
              .spawn()
              .map_err(|err| err.to_string())?;
          Ok(path_str)
      }
      ```

      ### 4. Update the frontend toast in App.tsx

      In `handleOpenSamplePromptbooksFolder`, remove the info toast line:
      ```tsx
      pushToast(`Sample promptbooks folder: ${sampleFolderPath}`, "info");
      ```
      Instead, only show an error toast if something fails (already handled by
      the catch block).  The function still works — it just no longer shows a
      non-dismissible info toast on success.

      ### 5. Update the test in ipc.rs

      The existing test `sample_promptbook_listing_filters_and_sorts_v1_yaml_files`
      calls `open_sample_promptbooks_folder()` directly without an AppHandle
      (since the refactored version requires one).
      Split: keep the listing/filtering test using `list_sample_promptbooks()` and
      `resolve_sample_promptbooks_dir()` directly (which don't need AppHandle),
      and just remove the `open_sample_promptbooks_folder` unit-test call (since
      we can't construct an AppHandle in unit tests — the IPC test for dialog
      commands is covered by compile-time verification).

      ## Verification
      - `cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml` — all pass
      - `pnpm test` — all pass
      - `pnpm lint` — zero errors
    verify:
      - "cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml"
      - "pnpm test"
      - "pnpm lint"

  - id: "model-effort-backend"
    title: "Backend: dynamic model+effort selection per agent"
    prompt: |
      Add the ability to specify a model and effort level when starting a run,
      and expose a command to list available models per agent.

      ## Goal
      - New IPC command: `list_agent_models(agent: String) -> Vec<IpcModelInfo>`
      - Update `start_run` to accept `model: Option<String>` and `effort_level: Option<String>`
      - Update `AdapterOptions` and each adapter's `build_command` to use model/effort
      - Persist model+effort in the run's `metadata_json`

      ## Implementation

      ### 1. Define model registry in agent_adapter.rs

      Add a data structure and function at the bottom of
      `apps/desktop/src-tauri/src/agent_adapter.rs`:

      ```rust
      #[derive(Debug, Clone, PartialEq, Eq, serde::Serialize, serde::Deserialize)]
      pub struct ModelInfo {
          pub id: String,
          pub name: String,
          pub supports_effort: bool,
      }

      pub fn models_for_agent(agent_name: &str) -> Vec<ModelInfo> {
          match agent_name {
              "claude" => vec![
                  ModelInfo { id: "claude-opus-4-5".into(), name: "Claude Opus 4.5".into(), supports_effort: true },
                  ModelInfo { id: "claude-sonnet-4-5".into(), name: "Claude Sonnet 4.5".into(), supports_effort: true },
                  ModelInfo { id: "claude-sonnet-4-6".into(), name: "Claude Sonnet 4.6".into(), supports_effort: true },
                  ModelInfo { id: "claude-haiku-3-5".into(), name: "Claude Haiku 3.5".into(), supports_effort: false },
              ],
              "codex" => vec![
                  ModelInfo { id: "o4-mini".into(), name: "o4-mini".into(), supports_effort: true },
                  ModelInfo { id: "o3".into(), name: "o3".into(), supports_effort: true },
              ],
              _ => vec![],
          }
      }
      ```

      ### 2. Extend AdapterOptions in agent_adapter.rs

      Add two fields to `AdapterOptions`:
      ```rust
      pub struct AdapterOptions {
          pub system_prompt: String,
          pub prompt_override: Option<String>,
          pub allow_all_tools: bool,
          pub model: Option<String>,           // NEW
          pub effort_level: Option<String>,    // NEW ("low" | "medium" | "high")
      }
      ```
      Update `impl Default for AdapterOptions` to set both new fields to `None`.

      ### 3. Update ClaudeAdapter::build_command

      In `ClaudeAdapter::build_command`, extend the shell command to include
      `--model` and `--effort` flags when they are set:
      ```rust
      let mut cmd_parts = vec![format!("cat {}", shell_single_quote(step_prompt_file_path))];
      cmd_parts.push("|".to_string());
      cmd_parts.push("claude".to_string());
      if let Some(ref model) = options.model {
          cmd_parts.push(format!("--model {}", shell_single_quote(model)));
      }
      if let Some(ref effort) = options.effort_level {
          cmd_parts.push(format!("--effort {}", shell_single_quote(effort)));
      }
      cmd_parts.push("-p".to_string());
      cmd_parts.push(shell_single_quote(&options.system_prompt));
      let command = cmd_parts.join(" ");
      CommandSpec::new("bash", vec!["-lc".to_string(), command], Some(PathBuf::from(workspace_dir)))
      ```

      ### 4. Update CodexAdapter::build_command

      Codex uses `--model` flag:
      ```rust
      let mut args = vec![
          "exec".to_string(),
          "--full-auto".to_string(),
          "--sandbox".to_string(),
          "workspace-write".to_string(),
      ];
      if let Some(ref model) = options.model {
          args.push("--model".to_string());
          args.push(model.clone());
      }
      args.push(instruction);
      ```

      ### 5. Thread model+effort through run_manager.rs

      a. Extend `PreparedRun` struct:
      ```rust
      pub struct PreparedRun {
          // existing fields …
          pub selected_model: Option<String>,
          pub selected_effort: Option<String>,
      }
      ```

      b. Extend `prepare_run` signature:
      ```rust
      fn prepare_run(
          promptbook_path: &str,
          agent: Option<&str>,
          workspace_dir: &str,
          model: Option<&str>,      // NEW
          effort_level: Option<&str>, // NEW
      ) -> RunManagerResult<PreparedRun>
      ```
      Set `selected_model` and `selected_effort` from parameters.
      Persist model+effort into `metadata_json`:
      ```rust
      let metadata = serde_json::json!({
          "promptbook_path": promptbook_path,
          "model": model,
          "effort_level": effort_level,
      });
      let metadata_json = Some(metadata.to_string());
      ```

      c. Pass model+effort to `execute_steps` → `AdapterOptions`:
      ```rust
      let adapter_options = AdapterOptions {
          model: prepared.selected_model.clone(),
          effort_level: prepared.selected_effort.clone(),
          ..AdapterOptions::default()
      };
      ```

      d. Update `run_promptbook` and `start_run_background` public signatures to
      accept `model: Option<&str>` and `effort_level: Option<&str>`.

      ### 6. New IPC command `list_agent_models` in ipc.rs

      ```rust
      #[derive(Debug, Clone, Serialize, Deserialize, PartialEq, Eq)]
      pub struct IpcModelInfo {
          pub id: String,
          pub name: String,
          pub supports_effort: bool,
      }

      #[tauri::command]
      pub fn list_agent_models(agent: String) -> IpcResult<Vec<IpcModelInfo>> {
          use crate::agent_adapter::{models_for_agent, ModelInfo};
          Ok(models_for_agent(&agent)
              .into_iter()
              .map(|m: ModelInfo| IpcModelInfo { id: m.id, name: m.name, supports_effort: m.supports_effort })
              .collect())
      }
      ```

      ### 7. Update `start_run` IPC command signature

      ```rust
      #[tauri::command]
      pub fn start_run(
          state: tauri::State<'_, IpcState>,
          promptbook_path: String,
          agent: Option<String>,
          model: Option<String>,         // NEW
          effort_level: Option<String>,  // NEW
          workspace_dir: String,
      ) -> IpcResult<i64>
      ```

      Pass `model.as_deref()` and `effort_level.as_deref()` to `start_run_background`.

      ### 8. Register `list_agent_models` in lib.rs invoke_handler

      Add `ipc::list_agent_models` to the `tauri::generate_handler![]` macro call.

      ### 9. Update IpcRunRecord to expose model and effort

      Add to `IpcRunRecord` struct in ipc.rs:
      ```rust
      pub model: Option<String>,
      pub effort_level: Option<String>,
      ```
      Populate them by parsing the run's `metadata_json` field:
      ```rust
      impl From<RunRecord> for IpcRunRecord {
          fn from(value: RunRecord) -> Self {
              let (model, effort_level) = parse_model_effort_from_metadata(value.metadata_json.as_deref());
              Self {
                  // existing fields …
                  model,
                  effort_level,
              }
          }
      }

      fn parse_model_effort_from_metadata(metadata: Option<&str>) -> (Option<String>, Option<String>) {
          let Some(json) = metadata else { return (None, None) };
          let Ok(value) = serde_json::from_str::<serde_json::Value>(json) else { return (None, None) };
          let model = value.get("model").and_then(|v| v.as_str()).map(ToOwned::to_owned);
          let effort = value.get("effort_level").and_then(|v| v.as_str()).map(ToOwned::to_owned);
          (model, effort)
      }
      ```

      ### 10. Update TypeScript types in ui-model.ts

      Add to `IpcRunRecord`:
      ```ts
      model: string | null;
      effort_level: string | null;
      ```
      Add to `IpcModelInfo` (new type):
      ```ts
      export type IpcModelInfo = {
        id: string;
        name: string;
        supports_effort: boolean;
      };
      ```

      ### 11. Update Rust unit tests

      - Update `run_event_envelope_json_roundtrip` and `run_payload_structs_json_roundtrip`
        tests in ipc.rs to include the new `model` and `effort_level` fields in `IpcRunRecord`.
      - Add a test `list_agent_models_returns_claude_models` that asserts
        `list_agent_models("claude".to_string())` returns at least 2 items with `supports_effort = true`.
      - Update dry-run tests in run_manager.rs to pass `None, None` for model/effort.

      ## Verification
      - `cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml` — all pass
      - `pnpm test` — all pass
      - `pnpm lint` — zero errors
    verify:
      - "cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml"
      - "pnpm test"
      - "pnpm lint"

  - id: "model-effort-ui"
    title: "Frontend: dynamic model + effort dropdowns"
    prompt: |
      Add model and effort level selectors to the dashboard form in App.tsx.
      The model list is fetched dynamically from the backend per agent,
      and the effort dropdown is shown only when the selected model supports it.

      ## Goal
      After a user picks an agent, a second dropdown appears with available models
      for that agent. If the chosen model `supports_effort === true`, a third dropdown
      appears for effort level: low / medium / high.

      ## Implementation

      ### 1. Extend DashboardForm type in App.tsx

      ```tsx
      type DashboardForm = {
        promptbookPath: string;
        agent: string;
        model: string;
        effortLevel: string;   // "low" | "medium" | "high" | ""
        workspaceDir: string;
      };
      ```

      Initial state:
      ```tsx
      const [dashboard, setDashboard] = useState<DashboardForm>({
        promptbookPath: "",
        agent: "codex",
        model: "",
        effortLevel: "medium",
        workspaceDir: "."
      });
      ```

      ### 2. Fetch models on agent change

      ```tsx
      const [availableModels, setAvailableModels] = useState<IpcModelInfo[]>([]);

      useEffect(() => {
        invoke<IpcModelInfo[]>("list_agent_models", { agent: dashboard.agent })
          .then((models) => {
            setAvailableModels(models);
            // auto-select first model if current selection not in list
            const currentExists = models.some((m) => m.id === dashboard.model);
            if (!currentExists) {
              setDashboard((d) => ({ ...d, model: models[0]?.id ?? "" }));
            }
          })
          .catch(() => setAvailableModels([]));
      }, [dashboard.agent]);
      ```

      Import `IpcModelInfo` from `./ui-model`.

      ### 3. Derive whether effort is supported

      ```tsx
      const selectedModelInfo = availableModels.find((m) => m.id === dashboard.model) ?? null;
      const supportsEffort = selectedModelInfo?.supports_effort ?? false;
      ```

      ### 4. Add model + effort dropdowns to the form (after Agent dropdown)

      ```tsx
      {availableModels.length > 0 && (
        <label>
          Model
          <select
            value={dashboard.model}
            onChange={(event) => updateDashboardField("model", event.target.value)}
          >
            {availableModels.map((model) => (
              <option key={model.id} value={model.id}>
                {model.name}
              </option>
            ))}
          </select>
        </label>
      )}

      {supportsEffort && (
        <label>
          Effort level
          <select
            value={dashboard.effortLevel}
            onChange={(event) => updateDashboardField("effortLevel", event.target.value)}
          >
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </label>
      )}
      ```

      ### 5. Pass model + effortLevel to start_run invoke

      In `handleStartRun`, extend the invoke call:
      ```tsx
      const runId = await invoke<number>("start_run", {
        promptbookPath: dashboard.promptbookPath,
        agent: dashboard.agent,
        model: dashboard.model || null,
        effortLevel: dashboard.effortLevel && supportsEffort ? dashboard.effortLevel : null,
        workspaceDir: dashboard.workspaceDir
      });
      ```

      ### 6. Update IpcRunRecord type in ui-model.ts

      Add (already done in previous step, but confirm):
      ```ts
      model: string | null;
      effort_level: string | null;
      ```

      ### 7. Update App.test.ts smoke test

      Ensure the smoke test still passes — the new dropdowns are conditionally rendered
      so they won't break the render test unless the mock IPC changes. Add a mock for
      `list_agent_models` that returns `[]` (empty) in the test setup.

      In `src/App.test.ts`, add to the `vi.mock("@tauri-apps/api/core", ...)` mock:
      ```tsx
      if (cmd === "list_agent_models") return Promise.resolve([]);
      ```

      ### 8. Add Vitest tests in ui-model.test.ts

      Add tests for `IpcModelInfo` shape (type import test — just assert the type exists):
      ```ts
      it("IpcModelInfo type is exported", () => {
        const model: import("./ui-model").IpcModelInfo = {
          id: "claude-sonnet-4-6",
          name: "Claude Sonnet 4.6",
          supports_effort: true,
        };
        expect(model.supports_effort).toBe(true);
      });
      ```

      ## Verification
      - `pnpm test` — all pass
      - `pnpm lint` — zero errors
    verify:
      - "pnpm test"
      - "pnpm lint"

  - id: "enhance-run-list"
    title: "Runs panel: rich item details (name, dir, agent, model, effort, step, datetime)"
    prompt: |
      The left "Runs" panel currently shows only `{name} v{version}` and a
      raw timestamp subtitle. Enhance each list item to show:
      1. Promptbook name (short, no version)
      2. Absolute workspace directory path
      3. Agent + model + effort level (e.g. "claude / claude-sonnet-4-6 / medium")
      4. Current step: step title + "Step N of M"
      5. Status badge
      6. Human-readable datetime instead of Unix timestamp

      ## Implementation

      ### 1. Extend RunManagerResult to store promptbook_path in runs table

      The `metadata_json` already stores `promptbook_path`. Extract workspace_dir too.

      In `run_manager.rs`, update `prepare_run` to also store `workspace_dir` in metadata:
      ```rust
      let metadata = serde_json::json!({
          "promptbook_path": promptbook_path,
          "workspace_dir": workspace_dir,
          "model": model,
          "effort_level": effort_level,
      });
      ```

      ### 2. Extend `parse_model_effort_from_metadata` in ipc.rs

      Rename to `parse_run_metadata` and return a struct:
      ```rust
      struct RunMetadata {
          model: Option<String>,
          effort_level: Option<String>,
          workspace_dir: Option<String>,
          promptbook_path: Option<String>,
      }

      fn parse_run_metadata(metadata: Option<&str>) -> RunMetadata {
          let Some(json) = metadata else { return RunMetadata { .. Default::default() } };
          let Ok(value) = serde_json::from_str::<serde_json::Value>(json) else {
              return RunMetadata { .. Default::default() };
          };
          RunMetadata {
              model: value.get("model").and_then(|v| v.as_str()).map(ToOwned::to_owned),
              effort_level: value.get("effort_level").and_then(|v| v.as_str()).map(ToOwned::to_owned),
              workspace_dir: value.get("workspace_dir").and_then(|v| v.as_str()).map(ToOwned::to_owned),
              promptbook_path: value.get("promptbook_path").and_then(|v| v.as_str()).map(ToOwned::to_owned),
          }
      }
      ```

      Implement `Default` for `RunMetadata`:
      ```rust
      impl Default for RunMetadata {
          fn default() -> Self {
              Self { model: None, effort_level: None, workspace_dir: None, promptbook_path: None }
          }
      }
      ```

      ### 3. Add fields to IpcRunRecord

      Add to `IpcRunRecord` in ipc.rs (and mirror in ui-model.ts):
      ```rust
      pub workspace_dir: Option<String>,
      ```

      Update `From<RunRecord> for IpcRunRecord` to populate it from metadata.

      ### 4. Update `createRunListViewModel` in ui-model.ts

      Replace the current minimal view with a richer one.
      Also import a helper to format ISO/Unix timestamps as human-readable:

      ```ts
      function formatDateTime(ts: string | null): string {
        if (!ts) return "—";
        // ts is either a Unix epoch string like "1700000000.000Z" or an ISO string
        let date: Date;
        if (/^\d+\.\d+Z$/.test(ts)) {
          date = new Date(parseFloat(ts) * 1000);
        } else {
          date = new Date(ts);
        }
        if (isNaN(date.getTime())) return ts;
        return date.toLocaleString(undefined, {
          year: "numeric", month: "short", day: "numeric",
          hour: "2-digit", minute: "2-digit"
        });
      }
      ```

      Update `RunListItemViewModel`:
      ```ts
      export type RunListItemViewModel = {
        id: number;
        title: string;
        subtitle: string;
        agentLine: string;       // "claude / claude-sonnet-4-6 / medium"
        workspaceLine: string;   // absolute dir or "."
        status: string;
        startedAt: string;       // formatted human datetime
      };
      ```

      Update `createRunListViewModel`:
      ```ts
      export function createRunListViewModel(runs: IpcRunRecord[]): RunListItemViewModel[] {
        return [...runs]
          .sort((l, r) => r.started_at.localeCompare(l.started_at))
          .map((run) => {
            const agent = run.agent_default ?? "—";
            const model = run.model ?? "";
            const effort = run.effort_level ?? "";
            const agentParts = [agent, model, effort].filter(Boolean);
            return {
              id: run.id,
              title: run.promptbook_name,
              subtitle: `v${run.promptbook_version}`,
              agentLine: agentParts.join(" / "),
              workspaceLine: run.workspace_dir ?? ".",
              status: run.status,
              startedAt: formatDateTime(run.started_at),
            };
          });
      }
      ```

      ### 5. Also expose current active step in list items

      To show the current step we need step data from runs. We can use the
      `IpcRunDetail` we already have for the selected run, or we can add a
      lightweight step summary to `IpcRunRecord`.

      For now, expose the steps from the full run detail on the selected run,
