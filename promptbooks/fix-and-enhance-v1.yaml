  - id: "per-step-progress"
    title: "Run Detail: per-step clickable tabs, live progress + final output per step"
    prompt: |
      Currently the Run Detail section shows all log lines from all steps in a single
      "Live Progress" pane, and Final Output is effectively broken (the step output is
      also just stdout mixed with progress).

      This step rewires the UI so:
      - The step list is clickable — clicking a step makes it "active" and shows
        its own Live Progress and Final Output tabs.
      - The currently running step is automatically made active.
      - The next pending step is labelled "next".
      - When the active step completes, the new running step automatically becomes active.
      - Live Progress shows only log lines for the active step.
      - Final Output shows the output record for the active step (from `outputs` table).
      - The backend already splits output: stdout lines are stored in `outputs` as "Final",
        all lines (stdout+stderr) in `logs` as "Live Progress". We just need the UI to use them correctly.

      ## Implementation

      ### 1. Understand existing data model

      In `IpcRunDetail`:
      - `logs`: all lines per step (step_id field identifies which step)
      - `outputs`: final output per step (one per step, populated when step finishes)
      - `steps`: step records with status

      ### 2. Update `RunDetailViewModel` in ui-model.ts

      Replace the current flat `liveLines` + `outputOptions` with a per-step model:

      ```ts
      export type StepViewModel = {
        stepId: string;
        title: string;
        status: string;           // "pending" | "running" | "success" | "failure" | "next"
        isActive: boolean;
        liveLines: string[];      // log lines for this step only
        finalOutput: string | null; // output content or null if not done
      };

      export type RunDetailViewModel = {
        liveProgressTitle: "Live Progress";
        finalOutputTitle: "Final Output";
        stepRows: StepViewModel[];
        activeStep: StepViewModel | null;
        // Legacy fields removed — use activeStep.liveLines / activeStep.finalOutput
      };
      ```

      Update `createRunDetailViewModel`:
      ```ts
      export function createRunDetailViewModel(
        detail: IpcRunDetail | null,
        activeStepId: string | null
      ): RunDetailViewModel {
        if (!detail) {
          return { liveProgressTitle: "Live Progress", finalOutputTitle: "Final Output", stepRows: [], activeStep: null };
        }

        const logsByStep = new Map<string, IpcLogRecord[]>();
        for (const log of detail.logs) {
          const arr = logsByStep.get(log.step_id) ?? [];
          arr.push(log);
          logsByStep.set(log.step_id, arr);
        }
        const outputByStep = new Map(detail.outputs.map((o) => [o.step_id, o]));

        // Determine which step is "next" (first pending step after all running/done steps)
        const runningIdx = detail.steps.findIndex((s) => s.status === "running");
        const nextStepId = runningIdx >= 0 && runningIdx + 1 < detail.steps.length
          ? detail.steps[runningIdx + 1].step_id
          : null;

        const stepRows: StepViewModel[] = detail.steps.map((step, idx) => {
          const isNext = step.step_id === nextStepId;
          const displayStatus = isNext ? "next" : step.status;
          const logs = logsByStep.get(step.step_id) ?? [];
          const output = outputByStep.get(step.step_id);
          return {
            stepId: step.step_id,
            title: step.title,
            status: displayStatus,
            isActive: step.step_id === activeStepId,
            liveLines: logs.map((l) => `[${l.stream}] ${l.line}`),
            finalOutput: output?.content ?? null,
          };
        });

        const activeStep = stepRows.find((s) => s.isActive) ?? stepRows[0] ?? null;

        return {
          liveProgressTitle: "Live Progress",
          finalOutputTitle: "Final Output",
          stepRows,
          activeStep,
        };
      }
      ```

      ### 3. Update `applyRunEvent` in ui-model.ts

      When a `step_started` event arrives for a step NOT already in the list,
      still add it (as before). When it IS a new step starting, the active step
      should auto-switch. We handle this in the component, not here.

      ### 4. Update App.tsx state and logic

      a. Replace `selectedOutputStepId` with `activeStepId`:
      ```tsx
      const [activeStepId, setActiveStepId] = useState<string | null>(null);
      ```

      b. Auto-update `activeStepId` when a new step starts:
      In the `run_event` listener, when `runEvent.type === "step_started"`:
      ```tsx
      if (runEvent.type === "step_started" && runEvent.step_id) {
        setActiveStepId(runEvent.step_id);
      }
      ```

      c. Update `detailViewModel` derivation:
      ```tsx
      const detailViewModel = useMemo(
        () => createRunDetailViewModel(runDetail, activeStepId),
        [runDetail, activeStepId]
      );
      ```

      d. When `runDetail` changes (new run selected), auto-select the
      running step (or first step):
      ```tsx
      useEffect(() => {
        if (!runDetail) {
          setActiveStepId(null);
          return;
        }
        const runningStep = runDetail.steps.find((s) => s.status === "running");
        const fallback = runDetail.steps[0];
        setActiveStepId(runningStep?.step_id ?? fallback?.step_id ?? null);
      }, [runDetail?.run.id]);
      ```
      Note: depend on `runDetail?.run.id` not `runDetail` to avoid re-triggering
      on every log line update.

      ### 5. Update the step list JSX in App.tsx

      Make each step row clickable, show status labels including "next":
      ```tsx
      <ul className="step-list">
        {detailViewModel.stepRows.length === 0 ? (
          <li className="empty-state">No steps recorded yet.</li>
        ) : (
          detailViewModel.stepRows.map((step) => (
            <li key={step.stepId} className={`step-row ${step.isActive ? "is-active" : ""}`}>
              <button
                type="button"
                className="step-row-btn"
                onClick={() => setActiveStepId(step.stepId)}
              >
                <span className="step-title">{step.title}</span>
                <span className={`status-pill ${step.status}`}>{step.status}</span>
              </button>
            </li>
          ))
        )}
      </ul>
      ```

      ### 6. Update the split panes in App.tsx

      Replace the current flat live/final panes with per-step content:
      ```tsx
      {detailViewModel.activeStep ? (
        <>
          <div className="split-tabs" role="tablist" aria-label="run detail panes">
            <button type="button" role="tab"
              aria-selected={splitPane === "live"} className={splitPane === "live" ? "is-active" : ""}
              onClick={() => setSplitPane("live")}>
              {detailViewModel.liveProgressTitle}
            </button>
            <button type="button" role="tab"
              aria-selected={splitPane === "final"} className={splitPane === "final" ? "is-active" : ""}
              onClick={() => setSplitPane("final")}>
              {detailViewModel.finalOutputTitle}
            </button>
          </div>

          <div className={`split-pane-grid ${splitPane === "live" ? "show-live" : "show-final"}`}>
            <section className="pane live-pane">
              <h3>{detailViewModel.liveProgressTitle} — {detailViewModel.activeStep.title}</h3>
              {detailViewModel.activeStep.liveLines.length === 0 ? (
                <p className="empty-state">No live progress yet.</p>
              ) : (
                <pre>{detailViewModel.activeStep.liveLines.join("\n")}</pre>
              )}
            </section>

            <section className="pane final-pane">
              <h3>{detailViewModel.finalOutputTitle} — {detailViewModel.activeStep.title}</h3>
              {detailViewModel.activeStep.finalOutput === null ? (
                <p className="empty-state">
                  {detailViewModel.activeStep.status === "running"
                    ? "Step in progress — final output will appear when done."
                    : "No final output for this step."}
                </p>
              ) : (
                <pre>{detailViewModel.activeStep.finalOutput}</pre>
              )}
            </section>
          </div>
        </>
      ) : (
        <p className="empty-state">Select a step to view its output.</p>
      )}
      ```

      ### 7. Update tests

      Update `createRunDetailViewModel` tests in `ui-model.test.ts`:
      - Pass `activeStepId` (second param) instead of `selectedOutputStepId`.
      - Assert `activeStep` is set and has `liveLines` / `finalOutput`.
      - Assert `stepRows[N].status === "next"` for the step after the running one.
      - Remove tests that reference old `liveLines` / `outputOptions` shape.

      Update `App.test.ts`:
      - Ensure the smoke test still passes with the new JSX structure.
      - Update mock IPC responses to include step data.

      ## Verification
      - `pnpm test` — all pass
      - `pnpm lint` — zero errors
    verify:
      - "pnpm test"
      - "pnpm lint"

  - id: "stop-resume"
    title: "Stop and Resume: pause a running step, resume from last stopped step"
    prompt: |
      Add stop and resume capabilities to running promptbook runs.

      ## Goal
      - In Run Detail: when a step is running, show a "Stop" button.
      - When clicked, it cancels the current run (existing `cancel_run` IPC).
      - When a run is stopped/failed, show a "Resume from step N" button that starts
        a new run beginning at the first non-success step.
      - The new resumed run appears in the Runs list.

      ## Implementation

      ### 1. Backend: `resume_run` IPC command

      Add a new command to `ipc.rs`:
      ```rust
      #[tauri::command]
      pub fn resume_run(
          state: tauri::State<'_, IpcState>,
          original_run_id: i64,
      ) -> IpcResult<i64> {
          // Load the original run to get promptbook path and agent
          let repo = StorageRepository::open_in_app_data_dir(&state.resolve_app_data_dir())
              .map_err(|err| err.to_string())?;
          let detail = repo.get_run_detail(original_run_id)
              .map_err(|err| err.to_string())?
              .ok_or_else(|| format!("run {original_run_id} not found"))?;

          let metadata = parse_run_metadata(detail.run.metadata_json.as_deref());
          let promptbook_path = metadata.promptbook_path
              .ok_or_else(|| "original run has no promptbook_path in metadata".to_string())?;
          let workspace_dir = metadata.workspace_dir.unwrap_or_else(|| ".".to_string());
          let agent = detail.run.agent_default.clone();
          let model = metadata.model.clone();
          let effort_level = metadata.effort_level.clone();

          // Find the first non-success step to resume from
          let resume_from_step = detail.steps.iter()
              .find(|s| s.status != "success")
              .map(|s| s.step_id.clone());

          let emitter = Arc::clone(&state.event_emitter);
          let callback = Arc::new(move |event: RunEvent| {
              let _ = emitter.emit_run_event(map_run_event(event));
          });

          start_run_background_from(
              &promptbook_path,
              agent.as_deref(),
              &workspace_dir,
              model.as_deref(),
              effort_level.as_deref(),
              resume_from_step.as_deref(),
              Some(callback),
          ).map_err(|err| err.to_string())
      }
      ```

      ### 2. Backend: `start_run_background_from` in run_manager.rs

      Add a new public function that accepts an optional `from_step_id`:
      ```rust
      pub fn start_run_background_from(
          promptbook_path: &str,
          agent: Option<&str>,
          workspace_dir: &str,
          model: Option<&str>,
          effort_level: Option<&str>,
          from_step_id: Option<&str>,
          event_callback: Option<RunEventCallback>,
      ) -> RunManagerResult<i64> {
          let prepared = prepare_run(promptbook_path, agent, workspace_dir, model, effort_level)?;
          // Filter steps if from_step_id is given
          // Store from_step_id in PreparedRun and use in execute_steps
          let run_id = prepared.run_id;
          register_run_handle(run_id)?;
          let app_data_dir = prepared.app_data_dir.clone();
          let from_step = from_step_id.map(ToOwned::to_owned);
          let join_handle = run_runtime().spawn_blocking(move || {
              let result = execute_prepared_run_from(prepared, from_step.as_deref(), event_callback);
              if result.is_err() {
                  let _ = unregister_run_handle(run_id);
                  if let Ok(repo) = StorageRepository::open_in_app_data_dir(&app_data_dir) {
                      let _ = repo.update_run_status(run_id, "failure", Some(&now_timestamp()));
                  }
              }
          });
          set_run_task(run_id, join_handle)?;
          Ok(run_id)
      }
      ```

      Add `execute_prepared_run_from` which calls `execute_steps` with a
      `from_step_id` filter:
      ```rust
      fn execute_prepared_run_from(
          prepared: PreparedRun,
          from_step_id: Option<&str>,
          event_callback: Option<RunEventCallback>,
      ) -> RunManagerResult<()> {
          // same as execute_prepared_run but passes from_step_id to execute_steps
          // ...
      }
      ```

      Update `execute_steps` to accept `from_step_id: Option<&str>` and skip
      steps before the matching step:
      ```rust
      fn execute_steps(
          repo: &StorageRepository,
          run_id: i64,
          promptbook: &PromptbookFile,
          selected_agent: Option<&str>,
          workspace_path: &Path,
          app_data_dir: &Path,
          from_step_id: Option<&str>,
          event_callback: Option<&RunEventCallback>,
      ) -> RunManagerResult<String> {
          let start_idx = match from_step_id {
              None => 0,
              Some(step_id) => promptbook.steps.iter().position(|s| s.id == step_id).unwrap_or(0),
          };
          // iterate from start_idx
          for step in &promptbook.steps[start_idx..] { ... }
      }
      ```

      ### 3. Register `resume_run` in lib.rs

      Add `ipc::resume_run` to `tauri::generate_handler![]`.

      ### 4. Frontend: Stop button

      In App.tsx, in the Run Detail section header, show a Stop button when the
      run status is "running":
      ```tsx
      {runDetail && runDetail.run.status === "running" && (
        <button
          type="button"
          className="danger-action"
          onClick={() => void handleStopRun()}
        >
          Stop
        </button>
      )}
      ```

      Add handler:
      ```tsx
      async function handleStopRun(): Promise<void> {
        if (selectedRunId === null) return;
        try {
          await invoke("cancel_run", { runId: selectedRunId });
          await loadRuns();
        } catch (error) {
          pushErrorToast(`Failed to stop run: ${getErrorMessage(error)}`);
        }
      }
      ```

      ### 5. Frontend: Resume button

      Show a Resume button when the run status is "failure" or "cancelled":
      ```tsx
      {runDetail && (runDetail.run.status === "failure") && (
        <button
          type="button"
          className="secondary-action"
          onClick={() => void handleResumeRun()}
        >
          Resume from failed step
        </button>
      )}
      ```

      Add handler:
      ```tsx
      async function handleResumeRun(): Promise<void> {
        if (selectedRunId === null) return;
        try {
          const newRunId = await invoke<number>("resume_run", { originalRunId: selectedRunId });
          await loadRuns();
          setSelectedRunId(newRunId);
        } catch (error) {
          pushErrorToast(`Failed to resume run: ${getErrorMessage(error)}`);
        }
      }
      ```

      ### 6. Add TypeScript type for IpcRunRecord `status` in ui-model.ts

      Update `createRunListViewModel` status handling to include "failure" and
