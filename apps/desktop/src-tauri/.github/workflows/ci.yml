name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install deps
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Lint (skeleton)
        run: pnpm lint || echo "lint script not wired yet"

      - name: Test (skeleton)
        run: pnpm test || echo "test script not wired yet"
