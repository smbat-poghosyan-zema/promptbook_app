schema_version: "promptbook/v1"
name: "hello-world"
version: "1.0.0"
description: "Two-step hello world sample that works with the dry-run adapter."
defaults:
  agent: "dry-run"
  workspace_dir: "."
  timeout_minutes: 10
steps:
  - id: "step-hello"
    title: "Generate hello output"
    prompt: |
      Say hello from Promptbook Runner and confirm the workspace path.
      Keep the answer short.
    verify:
      - "echo ok"
  - id: "step-summary"
    title: "Summarize run"
    prompt: |
      Summarize what happened in two bullet points.
    verify:
      - "echo ok"
metadata:
  tags:
    - "sample"
    - "dry-run"
  created_at: "2026-02-21T00:15:35Z"
